<section class="login">
  <h1>git-forge</h1>
  <form (submit)="$event.preventDefault(); submit()">
    <label>
      <span>Username</span>
      <input
        name="username"
        autocomplete="username"
        [(ngModel)]="username"
        required
      />
    </label>
    <label>
      <span>Password</span>
      <input
        type="password"
        name="password"
        autocomplete="current-password"
        [(ngModel)]="password"
        required
      />
    </label>
    @if (error()) {
      <p class="error">{{ error() }}</p>
    }
    <button type="submit" [disabled]="submitting()">
      {{ submitting() ? 'Signing in…' : 'Sign in' }}
    </button>
  </form>
</section>
